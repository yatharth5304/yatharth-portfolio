spring.datasource.url=${PORTFOLIO_DB_URL}
spring.datasource.username=${PORTFOLIO_DB_USERNAME}
spring.datasource.password=${PORTFOLIO_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway — disabled in local dev by default; enabled in prod via application-prod.properties.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Disable advisory locks for PgBouncer transaction-mode (Supabase pooler port 6543).
spring.flyway.postgresql.transactional-lock=false
# DEBUG so Flyway output is always visible in Render logs.
logging.level.org.flywaydb=DEBUG
# Serialize LocalDate as ISO string ("2026-04-01"), not array ([2026,4,1]).
spring.jackson.datatype.datetime.WRITE_DATES_AS_TIMESTAMPS=false

spring.devtools.restart.enabled=false
server.port=${PORT:8080}

# Serve index.html as the default page
spring.web.resources.static-locations=classpath:/static/

# Admin Panel Credentials
spring.security.user.name=${PORTFOLIO_ADMIN_USERNAME}
spring.security.user.password=${PORTFOLIO_ADMIN_PASSWORD}