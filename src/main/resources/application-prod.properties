spring.datasource.url=${PORTFOLIO_DB_URL}
spring.datasource.username=${PORTFOLIO_DB_USERNAME}
spring.datasource.password=${PORTFOLIO_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Disable advisory locks — required for PgBouncer transaction-mode compatibility.
# Without this, Flyway silently skips execution against Supabase's pooler (port 6543).
spring.flyway.postgresql.transactional-lock=false
# Dedicated Flyway connection. Falls back to the pooler URL if DIRECT var not set.
spring.flyway.url=${PORTFOLIO_DB_URL_DIRECT:${PORTFOLIO_DB_URL}}
spring.flyway.user=${PORTFOLIO_DB_USERNAME}
spring.flyway.password=${PORTFOLIO_DB_PASSWORD}
# Force Flyway logs to DEBUG so output is visible in Render regardless of silent failures.
logging.level.org.flywaydb=DEBUG

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

spring.devtools.restart.enabled=false
server.port=${PORT:8080}
