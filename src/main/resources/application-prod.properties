spring.datasource.url=${PORTFOLIO_DB_URL}
spring.datasource.username=${PORTFOLIO_DB_USERNAME}
spring.datasource.password=${PORTFOLIO_DB_PASSWORD}

# Prod: Flyway owns schema — Hibernate must not touch DDL.
# Changed from 'validate' to 'none': validation added 90+ second startup latency → Render timeout.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true


# Prod: Thymeleaf (admin panel templates)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

spring.devtools.restart.enabled=false
server.port=${PORT:8080}
