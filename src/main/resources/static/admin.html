<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-layout {
            max-width: 900px;
            margin: 100px auto;
            padding: 24px;
        }
        .admin-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            transition: var(--transition-fast);
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .status-msg {
            margin-top: 16px;
            font-size: 0.875rem;
            color: #10B981;
            display: none;
            background: rgba(16, 185, 129, 0.1);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .list-container {
            margin-bottom: 32px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.02);
        }
        .list-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .list-table th, .list-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .list-table th {
            font-weight: 500;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
        }
        .list-table tr:last-child td {
            border-bottom: none;
        }
        .btn-edit {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .btn-edit:hover {
            background: var(--accent-blue);
            color: #fff;
        }
        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 4px;
        }
        .btn-delete:hover {
            background: #ef4444;
            color: #fff;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Site
            </a>
            <span style="font-weight: 600; color: var(--text-muted);">Admin Panel</span>
        </div>
    </nav>

    <div class="admin-layout fade-in-up" style="opacity: 1; transform: translateY(0);">
        
        <!-- Projects Section -->
        <div class="admin-card">
            <div class="header-flex">
                <h2>Manage Projects</h2>
                <button class="btn btn-sm btn-outline" onclick="resetProjectForm()">+ New Project</button>
            </div>
            
            <div class="list-container">
                <table class="list-table">
                    <thead>
                        <tr>
                            <th>Project Title</th>
                            <th>Technologies</th>
                            <th style="width: 140px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="admin-projects-list">
                        <tr><td colspan="3" class="text-muted text-center" style="text-align: center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div style="border-top: 1px dashed var(--border-color); padding-top: 24px;">
                <h3 id="p_form_title" style="margin-bottom: 16px;">Add New Project</h3>
                <form id="projectForm">
                    <input type="hidden" id="p_id">
                    <div class="form-group">
                        <label>Project Title</label>
                        <input type="text" id="p_title" required placeholder="e.g. OMDb Movie Explorer">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="p_description" required placeholder="Describe what the project does and your role in it."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Technologies (Comma separated)</label>
                        <input type="text" id="p_technologies" placeholder="e.g. Java, Spring Boot, React">
                    </div>
                    <div class="form-group">
                        <label>GitHub Link</label>
                        <input type="url" id="p_githubLink" placeholder="https://github.com/yatharth5304/OMDBMovieExplorer">
                    </div>
                    <div class="form-group">
                        <label>Live Link (Optional)</label>
                        <input type="url" id="p_liveLink" placeholder="https://my-project-live.com">
                    </div>
                    <button type="submit" id="p_submit_btn" class="btn btn-primary">Save Project</button>
                    <button type="button" class="btn btn-outline" onclick="resetProjectForm()" style="margin-left: 8px;">Cancel</button>
                    <div id="p_status" class="status-msg">✅ Project saved successfully!</div>
                </form>
            </div>
        </div>

        <!-- Skills Section -->
        <div class="admin-card">
            <div class="header-flex">
                <h2>Manage Skills</h2>
                <button class="btn btn-sm btn-outline" onclick="resetSkillForm()">+ New Skill</button>
            </div>
            
            <div class="list-container">
                <table class="list-table">
                    <thead>
                        <tr>
                            <th>Skill Name</th>
                            <th>Category</th>
                            <th>Rating</th>
                            <th style="width: 140px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="admin-skills-list">
                        <tr><td colspan="4" class="text-muted text-center" style="text-align: center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div style="border-top: 1px dashed var(--border-color); padding-top: 24px;">
                <h3 id="s_form_title" style="margin-bottom: 16px;">Add Technical Skill</h3>
                <form id="skillForm">
                    <input type="hidden" id="s_id">
                    <div class="form-group">
                        <label>Skill Name</label>
                        <input type="text" id="s_name" required placeholder="e.g. PostgreSQL">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="s_category" placeholder="e.g. Backend, Database, DevOps" required>
                    </div>
                    <div class="form-group">
                        <label>Proficiency Rating (1-5)</label>
                        <input type="number" id="s_rating" min="1" max="5" placeholder="5">
                    </div>
                    <button type="submit" id="s_submit_btn" class="btn btn-primary">Save Skill</button>
                    <button type="button" class="btn btn-outline" onclick="resetSkillForm()" style="margin-left: 8px;">Cancel</button>
                    <div id="s_status" class="status-msg">✅ Skill saved successfully!</div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let allProjects = [];
        let allSkills = [];

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) {
                return parts.pop().split(';').shift();
            }
            return null;
        }

        function withCsrfHeaders(headers = {}) {
            const token = getCookie('XSRF-TOKEN');
            return token
                ? { ...headers, 'X-XSRF-TOKEN': decodeURIComponent(token) }
                : headers;
        }

        async function getApiMessage(response, fallbackMessage) {
            try {
                const payload = await response.json();
                if (payload?.message) {
                    return payload.message;
                }
                if (payload?.errors) {
                    return Object.values(payload.errors).join(', ');
                }
            } catch (e) {
                // no-op: fallback message will be used
            }
            return fallbackMessage;
        }

        function showStatus(statusElementId, message, isError = false) {
            const statusEl = document.getElementById(statusElementId);
            if (!statusEl) return;

            statusEl.textContent = message;
            statusEl.style.display = 'block';
            statusEl.style.color = isError ? '#FCA5A5' : '#10B981';
            statusEl.style.background = isError ? 'rgba(239, 68, 68, 0.12)' : 'rgba(16, 185, 129, 0.1)';
            statusEl.style.border = isError ? '1px solid rgba(239, 68, 68, 0.25)' : '1px solid rgba(16, 185, 129, 0.2)';

            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3500);
        }

        function normalizeUrl(value) {
            const trimmed = (value || '').trim();
            if (!trimmed) {
                return '';
            }
            if (trimmed.startsWith('http://') || trimmed.startsWith('https://')) {
                return trimmed;
            }
            return `https://${trimmed}`;
        }

        // Load Data on Start
        document.addEventListener('DOMContentLoaded', () => {
            loadProjects();
            loadSkills();
        });

        async function loadProjects() {
            try {
                const res = await fetch('/api/projects');
                allProjects = await res.json();
                const tbody = document.getElementById('admin-projects-list');
                
                if (allProjects.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-muted);">No projects found.</td></tr>';
                    return;
                }

                tbody.innerHTML = allProjects.map(p => `
                    <tr>
                        <td style="font-weight: 500; color: var(--text-primary);">${p.title}</td>
                        <td style="color: var(--text-muted); font-size: 0.875rem;">${p.technologies || '-'}</td>
                        <td style="display: flex;">
                            <button onclick="editProject(${p.id})" class="btn-edit">Edit</button>
                            <button onclick="deleteProject(${p.id})" class="btn-delete">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error("Failed to load projects", e);
            }
        }

        async function loadSkills() {
            try {
                const res = await fetch('/api/skills');
                allSkills = await res.json();
                const tbody = document.getElementById('admin-skills-list');
                
                if (allSkills.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No skills found.</td></tr>';
                    return;
                }

                tbody.innerHTML = allSkills.map(s => `
                    <tr>
                        <td style="font-weight: 500; color: var(--text-primary);">${s.name}</td>
                        <td style="color: var(--text-muted); font-size: 0.875rem;">${s.category || '-'}</td>
                        <td style="color: var(--accent-blue);">${s.rating || '-'}</td>
                        <td style="display: flex;">
                            <button onclick="editSkill(${s.id})" class="btn-edit">Edit</button>
                            <button onclick="deleteSkill(${s.id})" class="btn-delete">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error("Failed to load skills", e);
            }
        }

        // Project Edit & Reset
        function editProject(id) {
            const project = allProjects.find(p => p.id === id);
            if(!project) return;
            
            document.getElementById('p_form_title').textContent = 'Edit Project: ' + project.title;
            document.getElementById('p_submit_btn').textContent = 'Update Project';
            
            document.getElementById('p_id').value = project.id;
            document.getElementById('p_title').value = project.title;
            document.getElementById('p_description').value = project.description || '';
            document.getElementById('p_technologies').value = project.technologies || '';
            document.getElementById('p_githubLink').value = project.githubLink || '';
            document.getElementById('p_liveLink').value = project.liveLink || '';
            
            document.getElementById('p_form_title').scrollIntoView({ behavior: 'smooth' });
        }

        function resetProjectForm() {
            document.getElementById('projectForm').reset();
            document.getElementById('p_id').value = '';
            document.getElementById('p_form_title').textContent = 'Add New Project';
            document.getElementById('p_submit_btn').textContent = 'Save Project';
        }

        async function deleteProject(id) {
            if(!confirm('Are you sure you want to delete this project?')) return;
            try {
                const res = await fetch(`/api/admin/deleteProject/${id}`, {
                    method: 'DELETE',
                    headers: withCsrfHeaders()
                });
                if (res.ok) {
                    loadProjects();
                    return;
                }
                const message = await getApiMessage(res, 'Could not delete project');
                alert(message);
            } catch(e) {
                alert('Error deleting project');
            }
        }

        // Skill Edit & Reset
        function editSkill(id) {
            const skill = allSkills.find(s => s.id === id);
            if(!skill) return;
            
            document.getElementById('s_form_title').textContent = 'Edit Skill: ' + skill.name;
            document.getElementById('s_submit_btn').textContent = 'Update Skill';
            
            document.getElementById('s_id').value = skill.id;
            document.getElementById('s_name').value = skill.name;
            document.getElementById('s_category').value = skill.category || '';
            document.getElementById('s_rating').value = skill.rating || '';
            
            document.getElementById('s_form_title').scrollIntoView({ behavior: 'smooth' });
        }

        function resetSkillForm() {
            document.getElementById('skillForm').reset();
            document.getElementById('s_id').value = '';
            document.getElementById('s_form_title').textContent = 'Add Technical Skill';
            document.getElementById('s_submit_btn').textContent = 'Save Skill';
        }

        async function deleteSkill(id) {
            if(!confirm('Are you sure you want to delete this skill?')) return;
            try {
                const res = await fetch(`/api/admin/deleteSkill/${id}`, {
                    method: 'DELETE',
                    headers: withCsrfHeaders()
                });
                if (res.ok) {
                    loadSkills();
                    return;
                }
                const message = await getApiMessage(res, 'Could not delete skill');
                alert(message);
            } catch(e) {
                alert('Error deleting skill');
            }
        }

        // Submit Project
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('p_submit_btn');
            const originalText = btn.textContent;
            btn.textContent = 'Saving...';
            btn.disabled = true;
            
            const project = {
                title: document.getElementById('p_title').value,
                description: document.getElementById('p_description').value,
                technologies: document.getElementById('p_technologies').value,
                githubLink: normalizeUrl(document.getElementById('p_githubLink').value),
                liveLink: normalizeUrl(document.getElementById('p_liveLink').value)
            };
            
            const idVal = document.getElementById('p_id').value;
            if(idVal) {
                project.id = parseInt(idVal);
            }

            try {
                const res = await fetch('/api/admin/addProject', {
                    method: 'POST',
                    headers: withCsrfHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify(project)
                });
                if (res.ok) {
                    const message = await getApiMessage(res, 'Project saved successfully');
                    showStatus('p_status', message, false);
                    resetProjectForm();
                    loadProjects(); // Reload list
                } else {
                    const message = await getApiMessage(res, 'Error saving project');
                    showStatus('p_status', message, true);
                }
            } catch (err) {
                console.error(err);
                showStatus('p_status', 'Error saving project. Is the server running?', true);
            }
            btn.textContent = originalText;
            btn.disabled = false;
        });

        // Submit Skill
        document.getElementById('skillForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('s_submit_btn');
            const originalText = btn.textContent;
            btn.textContent = 'Saving...';
            btn.disabled = true;
            
            const skill = {
                name: document.getElementById('s_name').value,
                category: document.getElementById('s_category').value,
                rating: document.getElementById('s_rating').value
            };
            
            const idVal = document.getElementById('s_id').value;
            if(idVal) {
                skill.id = parseInt(idVal);
            }

            try {
                const res = await fetch('/api/admin/addSkill', {
                    method: 'POST',
                    headers: withCsrfHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify(skill)
                });
                if (res.ok) {
                    const message = await getApiMessage(res, 'Skill saved successfully');
                    showStatus('s_status', message, false);
                    resetSkillForm();
                    loadSkills(); // Reload list
                } else {
                    const message = await getApiMessage(res, 'Error saving skill');
                    showStatus('s_status', message, true);
                }
            } catch (err) {
                console.error(err);
                showStatus('s_status', 'Error saving skill. Is the server running?', true);
            }
            btn.textContent = originalText;
            btn.disabled = false;
        });
    </script>
</body>
</html>
