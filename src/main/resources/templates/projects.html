<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Navbar -->
<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="section projects-section">
    <h1 class="section-title">Projects</h1>

    <div class="project-grid">

        <div class="project-card" th:each="p : ${projects}">

            <h3 class="project-title" th:text="${p.title}">
                Project Title
            </h3>

            <p class="project-desc" th:text="${p.description}">
                Project description
            </p>

            <div class="project-tech" th:text="${p.technologies}">
                Technologies
            </div>

            <div class="project-links">
                <a th:href="${p.githubLink}" target="_blank">
                    GitHub ↗
                </a>
            </div>

        </div>

    </div>
</div>

<!-- Footer -->
<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
